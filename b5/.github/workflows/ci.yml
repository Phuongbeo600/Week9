name: Java CI Build & Test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Bước quan trọng: Chạy test và verify coverage
      - name: Run Tests and Check Coverage
        run: mvn clean verify

      # Trích xuất và lưu trữ báo cáo JaCoCo
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always() # Đảm bảo step này luôn chạy kể cả khi build fail (do không đủ 80%)
        with:
          name: jacoco-html-report
          path: target/site/jacoco/
          retention-days: 7 # Giữ file report trong 7 ngày